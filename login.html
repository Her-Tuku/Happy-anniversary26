<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #ffb3c6, #ff4d6d);
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }
        h1 { font-family: 'Great Vibes', cursive; color: #fff; font-size: 3.5rem; margin-bottom: 10px; }
        p { color: #fff; font-size: 0.9rem; margin-bottom: 30px; opacity: 0.9; }
        input[type="password"] {
            width: 100%;
            padding: 15px 20px;
            border-radius: 50px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #ff2f5e;
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: #fff;
            color: #ff2f5e;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #ff2f5e; color: #fff; transform: scale(1.05); }
        #feedbackMessage { margin-top: 15px; font-weight: 600; color: #fff; font-size: 0.85rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        /* Floating Hearts */
        .heart {
            position: absolute; width: 16px; height: 16px; background: #fff; transform: rotate(45deg);
            animation: float 8s linear infinite; opacity: 0.5; z-index: -1;
        }
        .heart::before, .heart::after { content: ""; width: 16px; height: 16px; background: #fff; border-radius: 50%; position: absolute; }
        .heart::before { top: -8px; left: 0; } .heart::after { left: -8px; top: 0; }
        @keyframes float { 0% { transform: translateY(100vh) rotate(45deg); opacity: 0; } 100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; } }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 id="title">Secure Access</h1>
        <p id="sub">Enter the security key to proceed 🤍</p>
        <form id="loginForm">
            <input type="password" name="password" id="pass" placeholder="Password..." required autofocus>
            <button type="submit">Unlock ❤️</button>
        </form>
        <div id="feedbackMessage"></div>
    </div>
    <script>
        // Hearts
        for(let i=0;i<20;i++){
            let h=document.createElement("div"); h.className="heart";
            h.style.left=Math.random()*100+"vw"; h.style.animationDuration=(Math.random()*3+5)+"s";
            document.body.appendChild(h);
        }
        // AJAX Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('pass').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `password=${encodeURIComponent(password)}`
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('sub').style.display = 'none';
                document.getElementById('title').innerText = data.message;
                document.getElementById('title').style.fontSize = '4.5rem';
                setTimeout(() => window.location.href = '/', 2000);
            } else {
                document.getElementById('feedbackMessage').innerText = data.message;
                document.querySelector('.login-card').animate([{transform:'translateX(0)'},{transform:'translateX(-10px)'},{transform:'translateX(10px)'},{transform:'translateX(0)'}], {duration:300});
            }
        });
    </script>
</body>
</html>
